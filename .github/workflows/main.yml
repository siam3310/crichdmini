
name: Update CricHD Streams

on:
  schedule:
    - cron: '*/50 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run scraper
      run: python crichd_scraper.py

    - name: Commit and push if there are changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add siamscrichd.m3u
        git diff --staged --quiet || (git commit -m "Update siamscrichd.m3u" && git push)
